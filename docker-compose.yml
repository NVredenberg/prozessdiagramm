services:
  prozessmodellierung:
    build: .
    container_name: prozessmodellierung
    restart: unless-stopped
    ports:
      - "${PROCESS_MODELING_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      DATA_DIR: "/app/data"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      CHAT_MODEL: "${CHAT_MODEL:-gemma4:12b}"
      EXTRACT_MODEL: "${EXTRACT_MODEL:-qwen2.5:14b}"
      MAX_QUESTIONS: "${MAX_QUESTIONS:-10}"
      ENABLE_OLLAMA_CHAT: "${ENABLE_OLLAMA_CHAT:-false}"
      ENABLE_OLLAMA_EXTRACTION: "${ENABLE_OLLAMA_EXTRACTION:-false}"
    volumes:
      - prozessmodellierung-data:/app/data

volumes:
  prozessmodellierung-data:
